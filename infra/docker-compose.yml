version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: recipeforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipeforge
      POSTGRES_USER: recipeforge
      POSTGRES_PASSWORD: recipeforge
    ports:
      - "5432:5432"
    volumes:
      - recipeforge_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: recipeforge-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - recipeforge_minio:/data

volumes:
  recipeforge_pgdata:
  recipeforge_minio:
